<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Klann linkage viewer</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="status">loading…</div>
  <div id="panel">
    <button id="play" title="Play/pause">▶</button>
    <select id="mode" title="Assembly">
      <option value="klann">klann</option>
      <option value="double">double</option>
      <option value="double_double">double double</option>
    </select>
    <input id="slider" type="range" min="0" max="1" step="1" value="0" />
    <span id="readout">frame 0 / phase 0.000</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
