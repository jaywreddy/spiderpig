<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Klann linkage viewer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; height: 100%; background: #101418; color: #cfd6de;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #stage { position: fixed; inset: 0; }
  #panel {
    position: fixed; left: 12px; right: 12px; bottom: 12px;
    background: rgba(16, 20, 24, 0.85); backdrop-filter: blur(6px);
    border: 1px solid #2a333d; border-radius: 8px;
    padding: 10px 14px; display: flex; gap: 14px; align-items: center;
  }
  #panel button {
    background: #2a333d; color: #cfd6de; border: 1px solid #3a444f;
    border-radius: 6px; padding: 6px 14px; cursor: pointer;
    font-size: 14px;
  }
  #panel button:hover { background: #36414d; }
  #panel select {
    background: #2a333d; color: #cfd6de; border: 1px solid #3a444f;
    border-radius: 6px; padding: 6px 8px; font-size: 13px;
    cursor: pointer;
  }
  #slider { flex: 1; accent-color: #3060ff; }
  #readout { min-width: 170px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
  #status { position: fixed; top: 12px; left: 12px; font-size: 12px; opacity: 0.7; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="status">loading…</div>
<div id="panel">
  <button id="play" title="Play/pause">▶</button>
  <select id="mode" title="Assembly">
    <option value="klann">klann</option>
    <option value="double">double</option>
    <option value="double_double">double double</option>
  </select>
  <input id="slider" type="range" min="0" max="1" step="1" value="0" />
  <span id="readout">frame 0 / phase 0.000</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
